<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hollywood Hacker - Verde</title>
  <style>
    :root {
      --bg: #020604;
      --panel: rgba(0, 18, 9, 0.78);
      --line: rgba(67, 255, 119, 0.22);
      --green: #35ff6b;
      --green-soft: #94ffad;
      --green-dim: #188a39;
      --warn: #f4e86b;
      --error: #ff5a5a;
      --text: #d9ffe0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--green);
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    #matrix {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 28% 22%, rgba(53, 255, 107, 0.11), transparent 28%),
        linear-gradient(180deg, #020604 0%, #001106 52%, #020604 100%);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0,
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: screen;
      opacity: 0.28;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      width: min(1180px, calc(100vw - 28px));
      height: min(760px, calc(100vh - 28px));
      margin: 14px auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow:
        0 0 0 1px rgba(53, 255, 107, 0.08),
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 0 50px rgba(53, 255, 107, 0.06);
      backdrop-filter: blur(2px);
      overflow: hidden;
    }

    .titlebar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 40px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(0, 26, 12, 0.92);
    }

    .lights {
      display: flex;
      gap: 7px;
    }

    .light {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green-dim);
      box-shadow: 0 0 12px rgba(53, 255, 107, 0.55);
    }

    .light:nth-child(2) {
      background: var(--warn);
      box-shadow: 0 0 12px rgba(244, 232, 107, 0.42);
    }

    .light:nth-child(3) {
      background: var(--error);
      box-shadow: 0 0 12px rgba(255, 90, 90, 0.35);
    }

    .title {
      min-width: 0;
      color: var(--green-soft);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 8px rgba(53, 255, 107, 0.42);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px var(--green);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .terminal {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.95fr);
      min-height: 0;
    }

    .output {
      min-width: 0;
      min-height: 0;
      padding: 14px;
      overflow: hidden;
      border-right: 1px solid var(--line);
      line-height: 1.38;
      font-size: clamp(11px, 1.15vw, 15px);
      text-shadow: 0 0 9px rgba(53, 255, 107, 0.32);
    }

    .line {
      min-height: 1.38em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line.dim {
      color: var(--green-dim);
    }

    .line.soft {
      color: var(--green-soft);
    }

    .line.warn {
      color: var(--warn);
    }

    .line.error {
      color: var(--error);
    }

    .tok-time {
      color: var(--green-dim);
    }

    .tok-bracket,
    .tok-muted {
      color: var(--green-dim);
    }

    .tok-tag {
      color: var(--green);
      font-weight: 700;
    }

    .tok-alert,
    .tok-error {
      color: var(--error);
      font-weight: 700;
    }

    .tok-ok,
    .tok-file,
    .tok-load {
      color: var(--warn);
      font-weight: 700;
    }

    .tok-command,
    .tok-path,
    .tok-hex,
    .tok-bar {
      color: var(--green);
    }

    .tok-arg,
    .tok-text {
      color: var(--text);
    }

    .tok-number {
      color: var(--green-soft);
    }

    .cursor::after {
      content: "_";
      display: inline-block;
      margin-left: 2px;
      color: var(--green-soft);
      animation: blink 0.9s steps(2, start) infinite;
    }

    .side {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      padding: 12px;
      gap: 12px;
      background: rgba(0, 8, 4, 0.38);
    }

    .meters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meter {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: rgba(0, 22, 10, 0.56);
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--green-soft);
      font-size: 11px;
      line-height: 1.2;
    }

    .bar {
      height: 8px;
      margin-top: 8px;
      border: 1px solid rgba(53, 255, 107, 0.24);
      border-radius: 4px;
      background: rgba(53, 255, 107, 0.08);
      overflow: hidden;
    }

    .bar-fill {
      width: 20%;
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green-soft));
      box-shadow: 0 0 12px rgba(53, 255, 107, 0.5);
      transition: width 180ms ease;
    }

    .map {
      min-height: 136px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background:
        linear-gradient(rgba(53, 255, 107, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(53, 255, 107, 0.08) 1px, transparent 1px),
        rgba(0, 18, 9, 0.54);
      background-size: 18px 18px;
      overflow: hidden;
    }

    .map-title {
      color: var(--green-soft);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .node-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 18px;
      color: var(--green-dim);
      font-size: 11px;
    }

    .node {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .mini-log {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: rgba(0, 18, 9, 0.54);
      overflow: hidden;
      color: var(--green-dim);
      font-size: 11px;
      line-height: 1.35;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      color: var(--green-dim);
      background: rgba(0, 26, 12, 0.86);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
    }

    .footer span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes pulse {
      50% {
        opacity: 0.35;
        transform: scale(0.72);
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow: auto;
      }

      .shell {
        width: calc(100vw - 16px);
        min-height: calc(100vh - 16px);
        height: auto;
        margin: 8px auto;
      }

      .terminal {
        grid-template-columns: 1fr;
      }

      .output {
        height: 58vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .side {
        min-height: 280px;
      }

      .titlebar {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .status {
        display: none;
      }

      .footer {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="shell" aria-label="Hollywood hacker terminal">
    <header class="titlebar">
      <div class="lights" aria-hidden="true">
        <span class="light"></span>
        <span class="light"></span>
        <span class="light"></span>
      </div>
      <div class="title">HOLLYWOOD://GREEN-SCREEN/SIMULATION</div>
      <div class="status"><span class="pulse"></span><span id="statusText">LIVE</span></div>
    </header>

    <section class="terminal">
      <div id="output" class="output" aria-live="polite"></div>

      <aside class="side">
        <div class="meters">
          <div class="meter">
            <div class="meter-label"><span>CPU</span><span id="cpuValue">00%</span></div>
            <div class="bar"><div id="cpuBar" class="bar-fill"></div></div>
          </div>
          <div class="meter">
            <div class="meter-label"><span>NET</span><span id="netValue">00%</span></div>
            <div class="bar"><div id="netBar" class="bar-fill"></div></div>
          </div>
          <div class="meter">
            <div class="meter-label"><span>AUTH</span><span id="authValue">00%</span></div>
            <div class="bar"><div id="authBar" class="bar-fill"></div></div>
          </div>
          <div class="meter">
            <div class="meter-label"><span>SYNC</span><span id="syncValue">00%</span></div>
            <div class="bar"><div id="syncBar" class="bar-fill"></div></div>
          </div>
        </div>

        <div class="map">
          <div class="map-title">NODE MAP</div>
          <div id="nodes"></div>
        </div>

        <div id="miniLog" class="mini-log"></div>
      </aside>
    </section>

    <footer class="footer">
      <span id="leftFooter">MODE: HOLLYWOOD</span>
      <span id="rightFooter">COLOR: GREEN</span>
    </footer>
  </main>

  <script>
    (function () {
      var running = true;
      var loadingActive = false;
      var output = document.getElementById("output");
      var miniLog = document.getElementById("miniLog");
      var statusText = document.getElementById("statusText");
      var leftFooter = document.getElementById("leftFooter");
      var rightFooter = document.getElementById("rightFooter");
      var nodes = document.getElementById("nodes");
      var canvas = document.getElementById("matrix");
      var ctx = canvas.getContext("2d");

      var maxLines = 42;
      var hexChars = "0123456789ABCDEF";
      var statuses = ["OK", "READY", "LOCKED", "SYNC", "TRACE", "WARN"];
      var modules = ["nova", "cipher", "ghost", "vector", "atlas", "proxy", "neon", "omega", "delta"];
      var users = ["root", "operator", "analyst", "system", "daemon", "bob", "dog"];
      var regions = ["sa-east", "us-west", "eu-north", "ap-south", "moon-base", "doghouse"];
      var errorReasons = [
        "checksum mismatch",
        "permission shadowed",
        "packet gap detected",
        "signature expired",
        "read timeout",
        "index drift",
        "unwashed dishes"
      ];
      var commandTemplates = [
        "scan --ports {portA}-{portB} --target {host}",
        "trace-route --mask {hex4} --hop-limit {n}",
        "decrypt --cipher aes-256 --chunk {hex8}",
        "mount /vault/{module} --read-only",
        "probe kernel.{module}.vector --sample-rate {n}k",
        "compile payload/{module}.wasm --dry-run",
        "sync cache://{host}/{module} --verify",
        "patch memory.page[{hex4}] --checksum {hex8}",
        "query auth.mesh --principal {user}",
        "stream packet.log --filter sig:{hex4}",
        "negotiate tunnel --region {region} --ttl {n}",
        "index fragments --bucket {module}-{hex4}"
      ];
      var logTemplates = [
        "handshake accepted from {host}:{port}",
        "entropy window stabilized at {percent}%",
        "rotating session key {hex8}",
        "shadow route mapped through node {host}",
        "buffer page {hex4} validated",
        "signature fragment {hex8} matched",
        "telemetry stream compressed {percent}%",
        "sandbox mirror warmed in {n}ms",
        "zero-trust gate returned status {status}",
        "packet burst normalized across {n} shards",
        "checksum drift corrected: {hex8}",
        "access vector scored {percent}/100"
      ];
      var fileTemplates = [
        "/vault/{module}/manifest.json",
        "/vault/{module}/payload-{hex4}.bin",
        "/cache/{region}/{module}.idx",
        "/tmp/{module}/trace-{hex4}.log",
        "/opt/shadow/{module}/kernel.map",
        "/mnt/ghost/{module}/packet-{hex4}.pcap",
        "/srv/{module}/checksum-{hex8}.sig",
        "/var/spool/{module}/fragment-{hex4}.dat",
        "/home/{user}/.cache/{module}/block-{hex4}",
        "/net/{host}/{module}/stream-{hex4}.buf"
      ];
      var mini = [];
      var drops = [];
      var columns = 0;
      var glyphs = "01ABCDEF#$%&*+-/<>[]{}";
      var spinnerFrames = ["|", "/", "-", "\\"];

      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function pick(list) {
        return list[rand(0, list.length - 1)];
      }

      function hex(length) {
        var value = "";
        for (var i = 0; i < length; i++) {
          value += hexChars[rand(0, hexChars.length - 1)];
        }
        return value;
      }

      function host() {
        return rand(10, 223) + "." + rand(0, 255) + "." + rand(0, 255) + "." + rand(1, 254);
      }

      function clock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, "0");
        var m = String(now.getMinutes()).padStart(2, "0");
        var s = String(now.getSeconds()).padStart(2, "0");
        var ms = String(now.getMilliseconds()).padStart(3, "0");
        return h + ":" + m + ":" + s + "." + ms;
      }

      function fillTemplate(template) {
        return template
          .replace(/\{portA\}/g, String(rand(1, 400)))
          .replace(/\{portB\}/g, String(rand(401, 9999)))
          .replace(/\{port\}/g, String(rand(1024, 65535)))
          .replace(/\{host\}/g, host())
          .replace(/\{hex4\}/g, hex(4))
          .replace(/\{hex8\}/g, hex(8))
          .replace(/\{n\}/g, String(rand(12, 999)))
          .replace(/\{module\}/g, pick(modules))
          .replace(/\{user\}/g, pick(users))
          .replace(/\{region\}/g, pick(regions))
          .replace(/\{percent\}/g, String(rand(37, 100)))
          .replace(/\{status\}/g, pick(statuses));
      }

      function token(text, cls) {
        return { text: text, cls: cls || "" };
      }

      function appendTokens(target, parts) {
        target.textContent = "";
        parts.forEach(function (part) {
          var span = document.createElement("span");
          span.textContent = part.text;
          if (part.cls) span.className = part.cls;
          target.appendChild(span);
        });
      }

      function trimLines() {
        while (output.children.length > maxLines) {
          output.removeChild(output.firstChild);
        }
        output.scrollTop = output.scrollHeight;
      }

      function addLine(parts, className) {
        var line = document.createElement("div");
        line.className = "line" + (className ? " " + className : "");
        if (typeof parts === "string") {
          line.textContent = parts;
        } else {
          appendTokens(line, parts);
        }
        output.appendChild(line);
        trimLines();
        return line;
      }

      function updateLine(line, parts) {
        if (!line) return;
        appendTokens(line, parts);
        output.scrollTop = output.scrollHeight;
      }

      function setCursor() {
        var old = output.querySelector(".cursor");
        if (old) old.classList.remove("cursor");
        var last = output.lastElementChild;
        if (last && running) last.classList.add("cursor");
      }

      function tagClass(tag) {
        if (tag === "ALERT" || tag === "ERR") return "tok-alert";
        if (tag === "WARN" || tag === "RETRY") return "tok-ok";
        if (tag === "OK" || tag === "DONE" || tag === "LOAD" || tag.indexOf("FILE") === 0) return "tok-ok";
        return "tok-tag";
      }

      function prefixParts(tag) {
        return [
          token(clock(), "tok-time"),
          token(" [", "tok-bracket"),
          token(tag, tagClass(tag)),
          token("] ", "tok-bracket")
        ];
      }

      function mixedParts(text, defaultClass) {
        var parts = [];
        var re = /(cache:\/\/[^\s]+|\/[^\s]+|payload\/[^\s]+|kernel\.[^\s]+|memory\.page\[[^\]]+\]|auth\.mesh|packet\.log|[A-F0-9]{4,}|[0-9]{1,3}(?:\.[0-9]{1,3}){3}(?::[0-9]+)?|--[a-z0-9-]+|\b[0-9]+%?\b)/gi;
        var last = 0;
        text.replace(re, function (match, _unused, offset) {
          if (offset > last) parts.push(token(text.slice(last, offset), defaultClass || "tok-text"));
          if (/^--/.test(match)) {
            parts.push(token(match, "tok-arg"));
          } else if (/^(cache:\/\/|\/|payload\/|kernel\.|memory\.page|auth\.mesh|packet\.log)/.test(match)) {
            parts.push(token(match, "tok-path"));
          } else if (/^[A-F0-9]{4,}$/.test(match)) {
            parts.push(token(match, "tok-hex"));
          } else if (/^[0-9]/.test(match)) {
            parts.push(token(match, "tok-number"));
          } else {
            parts.push(token(match, defaultClass || "tok-text"));
          }
          last = offset + match.length;
          return match;
        });
        if (last < text.length) parts.push(token(text.slice(last), defaultClass || "tok-text"));
        return parts;
      }

      function commandParts(command) {
        var firstSpace = command.indexOf(" ");
        var name = firstSpace === -1 ? command : command.slice(0, firstSpace);
        var rest = firstSpace === -1 ? "" : command.slice(firstSpace);
        return [
          token(clock(), "tok-time"),
          token(" $ ", "tok-tag"),
          token(name, "tok-command")
        ].concat(mixedParts(rest, "tok-text"));
      }

      function statusParts(tag, message) {
        return prefixParts(tag).concat(mixedParts(message, "tok-text"));
      }

      function progressBar(percent, width, fullChar, emptyChar) {
        var filled = Math.max(0, Math.min(width, Math.round((percent / 100) * width)));
        if (percent > 0 && percent < 100 && filled > 0) {
          return "[" + fullChar.repeat(filled - 1) + ">" + emptyChar.repeat(width - filled) + "]";
        }
        return "[" + fullChar.repeat(filled) + emptyChar.repeat(width - filled) + "]";
      }

      function progressParts(percent, detail) {
        return [
          token(clock(), "tok-time"),
          token(" ", "tok-muted"),
          token(progressBar(percent, 18, "#", "."), "tok-bar"),
          token(" " + String(percent).padStart(2, " ") + "% ", "tok-number")
        ].concat(mixedParts(detail, "tok-hex"));
      }

      function fileParts(index, total, percent, file) {
        return [
          token(clock(), "tok-time"),
          token(" [", "tok-bracket"),
          token("FILE " + String(index).padStart(2, "0") + "/" + String(total).padStart(2, "0"), "tok-file"),
          token("] ", "tok-bracket"),
          token(progressBar(percent, 14, "=", "."), "tok-bar"),
          token(" " + String(percent).padStart(3, " ") + "% ", "tok-number")
        ].concat(mixedParts(file, "tok-path"));
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function commandLine() {
        addLine(commandParts(fillTemplate(pick(commandTemplates))));
        setCursor();
      }

      function statusLine() {
        var tag = pick(statuses);
        var message = fillTemplate(pick(logTemplates));
        addLine(statusParts(tag, message));
        setCursor();
      }

      function alertLine() {
        addLine(statusParts("ALERT", fillTemplate("countermeasure {module}.{hex4} armed in {n}ms")));
        setCursor();
      }

      function hexDump() {
        var rows = rand(1, 3);
        for (var i = 0; i < rows; i++) {
          addLine([
            token(clock(), "tok-time"),
            token(" " + hex(8) + "  ", "tok-hex"),
            token(hex(16) + " ", "tok-muted"),
            token(hex(16) + " ", "tok-hex"),
            token(hex(16), "tok-muted")
          ]);
        }
        setCursor();
      }

      function progressLine() {
        var percent = rand(12, 98);
        addLine(progressParts(percent, hex(24)));
        setCursor();
      }

      async function runLoadingEvent() {
        loadingActive = true;
        var module = pick(modules);
        var id = hex(6);
        var total = rand(4, 7);
        var files = [];
        var errorIndex = Math.random() < 0.55 ? rand(0, total - 1) : -1;

        for (var i = 0; i < total; i++) {
          files.push(fillTemplate(pick(fileTemplates)));
        }

        addLine(statusParts("LOAD", "opening bundle " + module + "/" + id));
        var waitLine = addLine(statusParts("WAIT", "resolving " + total + " staged files " + spinnerFrames[0]));
        setCursor();

        for (var spin = 0; spin < rand(4, 7) && running; spin++) {
          updateLine(waitLine, statusParts("WAIT", "mapping virtual blocks " + spinnerFrames[spin % spinnerFrames.length] + " " + hex(12)));
          await wait(rand(120, 210));
        }

        for (var fileIndex = 0; fileIndex < files.length && running; fileIndex++) {
          var file = files[fileIndex];
          var line = addLine(fileParts(fileIndex + 1, total, 0, file));
          var progress = 0;
          var recovered = false;

          while (progress < 100 && running) {
            progress = Math.min(100, progress + rand(8, 24));
            updateLine(line, fileParts(fileIndex + 1, total, progress, file));
            setCursor();
            await wait(rand(70, 150));

            if (!recovered && fileIndex === errorIndex && progress >= 55) {
              addLine(statusParts("ERR", file + " " + pick(errorReasons)));
              addLine(statusParts("RETRY", "reloading shard " + hex(4) + " with fallback mirror"));
              progress = rand(8, 24);
              recovered = true;
              await wait(rand(260, 420));
            }
          }

          addLine(statusParts("OK", "loaded " + file));
          await wait(rand(70, 180));
        }

        if (running) {
          addLine(statusParts("DONE", "loaded " + total + "/" + total + " files into " + module + "/" + id));
          addLine(statusParts("RESUME", "returning to live terminal stream " + hex(16)));
          setCursor();
        }

        loadingActive = false;
      }

      function burst() {
        if (loadingActive) return;
        var choice = rand(0, 100);
        if (choice < 25) commandLine();
        else if (choice < 46) statusLine();
        else if (choice < 63) progressLine();
        else if (choice < 78) hexDump();
        else if (choice < 88) alertLine();
        else runLoadingEvent();
      }

      function updateMeters() {
        var pairs = [
          ["cpu", rand(22, 99)],
          ["net", rand(18, 94)],
          ["auth", rand(35, 100)],
          ["sync", rand(8, 100)]
        ];

        pairs.forEach(function (pair) {
          document.getElementById(pair[0] + "Value").textContent = String(pair[1]).padStart(2, "0") + "%";
          document.getElementById(pair[0] + "Bar").style.width = pair[1] + "%";
        });

        leftFooter.textContent = "SESSION: " + hex(8) + " / SIMULATION";
        rightFooter.textContent = "ROUTE: " + host();
      }

      function updateNodes() {
        nodes.innerHTML = "";
        for (var i = 0; i < 7; i++) {
          var row = document.createElement("div");
          row.className = "node-row";
          var dot = document.createElement("span");
          dot.className = "node";
          var text = document.createElement("span");
          text.textContent = "node-" + hex(3) + " :: " + host();
          row.appendChild(dot);
          row.appendChild(text);
          nodes.appendChild(row);
        }
      }

      function updateMiniLog() {
        mini.unshift(clock() + " route " + hex(4) + " accepted");
        mini = mini.slice(0, 13);
        miniLog.textContent = mini.join("\n");
      }

      function resizeCanvas() {
        var ratio = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        columns = Math.ceil(window.innerWidth / 16);
        drops = Array.from({ length: columns }, function () {
          return rand(-40, 0);
        });
      }

      function drawMatrix() {
        if (!running) return;
        ctx.fillStyle = "rgba(2, 6, 4, 0.15)";
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.font = "15px Consolas, monospace";
        ctx.fillStyle = "rgba(53, 255, 107, 0.62)";

        for (var i = 0; i < drops.length; i++) {
          var char = glyphs[rand(0, glyphs.length - 1)];
          var x = i * 16;
          var y = drops[i] * 16;
          ctx.fillText(char, x, y);

          if (y > window.innerHeight && Math.random() > 0.965) {
            drops[i] = rand(-20, 0);
          }
          drops[i]++;
        }

        requestAnimationFrame(drawMatrix);
      }

      function stop() {
        if (!running) return;
        running = false;
        statusText.textContent = "STOPPED";
        addLine(statusParts("HALT", "session terminated by local input"), "warn");
        setCursor();
      }

      function start() {
        resizeCanvas();
        updateNodes();
        updateMeters();
        updateMiniLog();

        addLine([
          token("hacker-animation", "tok-command"),
          token("  theme=hollywood color=green speed=fast density=high", "tok-muted")
        ]);
        addLine(mixedParts("session=" + hex(12) + " mode=visual-simulation channel=browser", "tok-muted"));
        addLine("");
        setCursor();

        drawMatrix();
        setInterval(function () {
          if (!running) return;
          burst();
        }, 95);
        setInterval(function () {
          if (!running) return;
          updateMeters();
          updateMiniLog();
        }, 620);
        setInterval(function () {
          if (!running) return;
          updateNodes();
        }, 1600);
      }

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("keydown", function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
          event.preventDefault();
          stop();
        }
        if (event.key === "Escape") {
          stop();
        }
      });

      start();
    })();
  </script>
</body>
</html>
